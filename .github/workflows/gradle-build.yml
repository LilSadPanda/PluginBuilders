name: Gradle Build

on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      ref:
        default: ''
        required: false
        type: string
      target:
        default: 'build/libs/*.jar'
        required: false
        type: string
      name:
        default: 'Artifact'
        required: false
        type: string
      commands:
        default: 'echo Nothing here'
        required: false
        type: string
      java:
        default: '17'
        required: false
        type: string
      distribution:
        default: 'temurin'
        required: false
        type: string
      os:
        default: 'ubuntu-latest'
        required: false
        type: string
      tasks:
        default: 'build'
        required: false
        type: string
      version:
        default: 'wrapper'
        required: false
        type: string
      cache:
        default: 'default'
        required: false
        type: string
      dir:
        default: '.'
        required: false
        type: string
      readonly:
        default: false
        required: false
        type: boolean

jobs:
  build:
    runs-on: ${{ inputs.os }}
    env:
      ARTIFACT_DIR: artifact
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4.7.1
        with:
          java-version: ${{ inputs.java }}
          distribution: ${{ inputs.distribution }}

      - name: Run commands
        run: |
          set -euo pipefail
          ${{ inputs.commands }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: ${{ inputs.readonly }}

      - name: Build with Gradle
        shell: bash
        working-directory: ${{ inputs.dir }}
        run: |
          set -euo pipefail
          ./gradlew ${{ inputs.tasks }}

      - name: Prepare artifact bundle
        shell: bash
        run: |
          set -euo pipefail
          artifact_path="$PWD/$ARTIFACT_DIR"
          mkdir -p "$artifact_path"
          shopt -s nullglob globstar

          build_dir="${{ inputs.dir }}"
          if [ -z "$build_dir" ]; then
            build_dir='.'
          fi

          if [ "$build_dir" != "." ]; then
            pushd "$build_dir" >/dev/null
          fi

          artifacts_found=false
          for path in ${{ inputs.target }}; do
            artifacts_found=true
            cp -r "$path" "$artifact_path/"
          done

          if ! $artifacts_found; then
            echo "No build outputs found using pattern: ${{ inputs.target }}" >&2
            exit 1
          fi

          if [ "$build_dir" != "." ]; then
            popd >/dev/null
          fi

          license_found=false
          declare -a license_patterns=(
            LICENSE
            LICENSE.*
            LICENCE
            LICENCE.*
            COPYING
            COPYING.*
            NOTICE
            NOTICE.*
          )

          declare -a search_roots=(".")
          if [ "$build_dir" != "." ]; then
            search_roots+=("$build_dir")
          fi

          for root in "${search_roots[@]}"; do
            for pattern in "${license_patterns[@]}"; do
              matches=("$root"/$pattern)
              for match in "${matches[@]}"; do
                if [ -e "$match" ]; then
                  cp -r "$match" "$artifact_path/"
                  license_found=true
                fi
              done
            done
          done

          if ! $license_found; then
            {
              echo "No license file was detected in the repository when this build ran."
              echo "Always review the upstream project to confirm licensing terms."
            } > "$artifact_path/NO_LICENSE_FOUND.txt"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: ${{ env.ARTIFACT_DIR }}
