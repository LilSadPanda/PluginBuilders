name: Gradle Build

on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      ref:
        default: ''
        required: false
        type: string
      target:
        default: 'build/libs/*.jar'
        required: false
        type: string
      name:
        default: 'Artifact'
        required: false
        type: string
      commands:
        default: 'echo Nothing here'
        required: false
        type: string
      java:
        default: '17'
        required: false
        type: string
      distribution:
        default: 'temurin'
        required: false
        type: string
      os:
        default: 'ubuntu-latest'
        required: false
        type: string
      tasks:
        default: 'build'
        required: false
        type: string
      version:
        default: 'wrapper'
        required: false
        type: string
      cache:
        default: 'default'
        required: false
        type: string
      dir:
        default: '.'
        required: false
        type: string
      readonly:
        default: false
        required: false
        type: boolean

jobs:
  build:
    runs-on: ${{ inputs.os }}
    env:
      ARTIFACT_DIR: artifact
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4.7.1
        with:
          java-version: ${{ inputs.java }}
          distribution: ${{ inputs.distribution }}
          cache: gradle

      - name: Run commands
        run: |
          set -euo pipefail
          ${{ inputs.commands }}

      - name: Build with Gradle
        uses: burrunan/gradle-cache-action@v2
        with:
          job-id: ${{ github.workflow }}-${{ inputs.cache }}
          arguments: ${{ inputs.tasks }}
          gradle-version: ${{ inputs.version }}
          build-root-directory: ${{ inputs.dir }}
          read-only: ${{ inputs.readonly }}

      - name: Prepare artifact bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          shopt -s nullglob globstar

          artifacts_found=false
          for path in ${{ inputs.target }}; do
            artifacts_found=true
            cp -r "$path" "$ARTIFACT_DIR/"
          done

          if ! $artifacts_found; then
            echo "No build outputs found using pattern: ${{ inputs.target }}" >&2
            exit 1
          fi

          license_found=false
          declare -a license_patterns=(
            LICENSE
            LICENSE.*
            LICENCE
            LICENCE.*
            COPYING
            COPYING.*
            NOTICE
            NOTICE.*
          )

          for pattern in "${license_patterns[@]}"; do
            for match in $pattern; do
              if [ -e "$match" ]; then
                cp -r "$match" "$ARTIFACT_DIR/"
                license_found=true
              fi
            done
          done

          if ! $license_found; then
            printf '%s\n%s\n' \
              'No license file was detected in the repository when this build ran.' \
              'Always review the upstream project to confirm licensing terms.' \
              > "$ARTIFACT_DIR/NO_LICENSE_FOUND.txt"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: ${{ env.ARTIFACT_DIR }}
